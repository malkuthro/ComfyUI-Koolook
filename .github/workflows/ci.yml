name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-smoke:
    name: Lint & Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff==0.6.9

      - name: Ruff check
        run: ruff check .

      - name: Compile all (syntax smoke)
        run: python -m compileall -q -x '(\.venv|forks|upscaler_FIX/github_repos|nuke_CAM_exporter)' .

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit==1.7.10

      - name: Bandit scan
        run: bandit -r . -x ./.venv,./forks,./upscaler_FIX,./nuke_CAM_exporter -ll

  preflight:
    name: Pre-flight Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pre-flight (static + dispatch + workflow fixtures)
        # manager-meta is skipped on PRs because the upstream node-map drift
        # is owned by an external repo (ltdrdata/ComfyUI-Manager) and is
        # tracked separately via issue #44. Re-enable by removing --skip
        # once that issue is resolved upstream.
        run: python tools/preflight_release.py --skip manager-meta -v

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        # Install the deps directly — this project is a ComfyUI custom node,
        # not a pip-installable package, so ``pip install .[test]`` tries to
        # build a wheel and fails on flat-layout discovery of ``web/`` and
        # ``forks/``. The pyproject's ``[project.optional-dependencies]
        # test`` block is the spec; CI mirrors it explicitly. ``aiohttp`` is
        # a runtime dep of ``koolook_routes`` and must be importable even
        # when only a pure helper is under test.
        run: pip install "pytest>=8" "aiohttp>=3.9"

      - name: Run pytest
        run: pytest -q

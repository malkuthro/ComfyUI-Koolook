schema_version: 1
kind: card-reading-graph
module: ltx-2.3/audio-lipsync
created: 2026-05-29
tracking_issue: https://github.com/malkuthro/ComfyUI-Koolook/issues/177
companion_docs:
  visual: reading-graph.html
  cheatsheet: CHEATSHEET.md
  loop_protocol: runs/LOOP.md
  rationale: backstory/audio-lipsync-rationale.md

# ----------------------------------------------------------------------------
# Source families — every card value must trace to one of these two.
# ----------------------------------------------------------------------------

source_families:
  multilines:
    description: >
      Five semantic Text Multiline captures on the canvas. tracked_multilines
      maps each stable capture key to a prioritized list of case-insensitive
      title aliases. Body = widgets_values[0]. Some keys may match multiple
      nodes (working_folder can ship in duplicate — project mount + local
      mirror); extract_multilines() keeps all hits and the caller picks the
      one that resolves on disk.
    aliases:
      working_folder:
        - "global [ path ] - working folder"
        - working_folder
        - "working folder"
      name:
        - "global [ base name ]"
        - name
      relay_overrides:
        - relay_overrides
      "overlay - info":
        - "overlay - info"
      "overlay - feedback":
        - "overlay - feedback"
    config_key: scripts/loop_audio.config.json::tracked_multilines

  setup_variables:
    description: >
      Extra variables from the canvas SETUP variables note. These are captured
      into notes.md for audit rather than rendered on the card. Version and
      run offset are PrimitiveInt nodes in v02, so this source family reads
      only source value nodes (Text Multiline and Primitive*) and deliberately
      ignores GetNode / SetNode relay plumbing. GLOBAL [ run ] is calculated
      inside the workflow from version + offset; the capture records the
      inputs instead of reimplementing that graph math. The BASE note is a
      checklist/reminder, not a value; its [ai] placeholders are replaced by
      derived facts from the Director timeline and repo state.
    aliases:
      input_path_exr:
        - "input path [ exr ]"
      version:
        - "global [ version ]"
        - "version [ global ]"
      run_offset:
        - "global [ run offset ]"
    config_key: scripts/loop_audio.config.json::tracked_setup_variables

  director_node:
    description: >
      The active LTXDirector node. Koolook variants are used for modified
      runs; upstream `LTXDirector` is accepted for A/B comparison and is
      labeled as original upstream on the card. Card reads both widget
      values AND input-socket wiring (audio_vae link is what gates audio
      production at runtime). Upstream comparison runs also read the
      installed WhatDreamsCost version from the live
      `WhatDreamsCost-ComfyUI/pyproject.toml` beside
      `$KOLOOK_COMFYUI_DEV_PATH` so the card can show the lock pin tag.
    type: LTXDirector__koolook
    legacy_type: LTXDirector__koolook_v1_3_2
    upstream_type: LTXDirector
    upstream: WhatDreamsCost-ComfyUI LTXDirector
    widget_order:
      # Empirical — frontend serialises widgets in legacy upstream order;
      # the Koolook fork only appends relay_overrides at the end.
      0: global_prompt
      1: duration_frames
      2: duration_seconds
      3: timeline_data
      4: local_prompts
      5: segment_lengths
      6: epsilon
      7: guide_strength
      8: use_custom_audio
      9: frame_rate
      10: display_mode
      11: custom_width
      12: custom_height
      13: resize_method
      14: divisible_by
      15: img_compression
      16: relay_overrides
    input_sockets_consulted:
      - audio_vae          # used by derive_audio_state
    nested_json:
      timeline_data:
        segments:
          fields: [id, start, length, prompt, type, imageFile, imageB64]
        audioSegments:
          fields: [id, start, length, audioFile, audioB64, trimStart]

forbidden_visual_sources:
  - BasicScheduler widgets
  - KSamplerSelect widgets
  - RandomNoise widgets
  - CFGGuider widgets
  - LTXDirectorGuide widgets
  - VAELoaderKJ / CheckpointLoaderSimple / DualCLIPLoader widgets
  - web/_dev_build.json (captured in metadata only, not displayed on the card)
  - git rev-parse / git status output
  - hardcoded sampler / cfg / seed constants
  - substring matches on segment.prompt text (e.g. "[Audio]:" as wiring signal)

# ----------------------------------------------------------------------------
# Audio state machine — structural reduction of three director signals.
# ----------------------------------------------------------------------------

audio_state_machine:
  inputs:
    director_present:
      source: extract_director(nodes) is not None
      type: bool
    audio_vae_wired:
      source: director_node.inputs[name=audio_vae].link != null
      type: bool
    use_custom_audio:
      source: director_node.widgets_values[8]
      type: bool
    audio_segments_count:
      source: director_node.widgets_values[3].audioSegments | length
      type: int
  states:
    - label: "(no director)"
      condition: director_present == false
      runtime_behavior: >
        No Koolook or upstream Director node on the canvas. Loop runs
        but the Director structural state is unavailable.
        Surfaced distinctly so a missing-Director workflow doesn't
        silently collapse into the "VAE unwired" state (the pre-fix bug
        the multi-agent review caught).
    - label: "off (no VAE)"
      condition: director_present == true AND audio_vae_wired != true
      runtime_behavior: >
        Director's `if audio_vae is not None` branch (ltx_director.py:610)
        is False — no audio latent produced regardless of any other widget.
        Covers both audio_vae socket-unwired and audio_vae socket-absent
        (older schemas) — both are functionally identical at runtime.
    - label: "model-gen"
      condition: director_present == true AND audio_vae_wired == true AND use_custom_audio == false
      runtime_behavior: >
        Empty audio latent path (line 622 if-branch not taken). Audio is
        generated from prompt content by the model.
    - label: "custom"
      condition: director_present == true AND audio_vae_wired == true AND use_custom_audio == true AND audio_segments_count > 0
      runtime_behavior: >
        Encoded audio path. `_build_combined_audio` decodes audioSegments
        via PyAV and feeds them to audio_vae.encode().
    - label: "custom (empty)"
      condition: director_present == true AND audio_vae_wired == true AND use_custom_audio == true AND audio_segments_count == 0
      runtime_behavior: >
        Edge case — toggle is on but no audio files uploaded. Director
        returns empty latent (`_build_combined_audio` returns empty_audio).

# ----------------------------------------------------------------------------
# State dict — single contract between extraction (loop_audio.py) and
# renderer (make_card_audio.py). Every key traces to a source above.
# ----------------------------------------------------------------------------

state_dict:
  bookkeeping:
    run_number:        { source: loop, type: int,  desc: "next available NNN under runs/" }
    run_label:         { source: loop, type: str,  desc: "autogen_label or explicit override" }
    date:              { source: loop, type: str,  desc: "ISO today" }
    workflow_name:     { source: loop, type: str,  desc: "archive workflow basename, e.g. runNNN_workflow.json" }
    source_workflow_name: { source: "wf_path.name", type: str, desc: "original copied Comfy workflow filename" }
  multiline_derived:
    name:                { source: "multilines.name[0]" }
    relay_overrides_raw: { source: "multilines.relay_overrides[0]" }
    info_body:           { source: "multilines.overlay - info[0]" }
    feedback_lines:      { source: "parse_feedback(multilines.overlay - feedback[0]).lines" }
    scores:              { source: "parse_feedback(multilines.overlay - feedback[0]).scores" }
    work_folder:         { source: "pick_existing_path(multilines.working_folder)" }
  director_derived:
    director_node:       { source: "extract_director(nodes)" }
    director_variant:    { source: "actual Director node type OR '(missing)'" }
    director_flavor:     { source: "director_flavor(director_node): Koolook / Original upstream / (missing)" }
    director_pin_tag:    { source: "director_pin_tag(director_node, detect_upstream_whatdreamscost_version())" }
    audio_src:           { source: "derive_audio_state(director_node, timeline)" }
    epsilon:             { source: "director.widgets_values[6]" }
    frame_rate:          { source: "director.widgets_values[9]" }
    segments:            { source: "parse_timeline(director).segments (numeric fields coerced via _coerce_segment_numeric)" }
    audio_segments:      { source: "parse_timeline(director).audioSegments (numeric fields coerced)" }
    segment_prompt_mode: { source: "segment_prompt_mode(segments): none / single / same / per-segment / missing" }
    output_folder:       { source: "expected_output_tracking(nodes, multilines, setup_variables).folder" }
    output_name:         { source: "expected_output_tracking(nodes, multilines, setup_variables).name" }
    metadata:            { source: "card_metadata(...)", consumer: "metadata.json + PNG text chunk koolook_audio_loop" }
  notes_only:
    setup_variables:   { source: "extract_setup_variables(nodes, tracked_setup_variables)", consumer: "render_notes_md" }
    # These flow to notes.md but NOT through the state dict — the
    # renderer dropped the Duration row in favour of per-segment time
    # ranges, so keeping them in state would document a contract the
    # renderer doesn't honour.
    duration_frames:     { source: "director_widget(director_node, 'duration_frames')", consumer: "render_notes_md" }
    duration_seconds:    { source: "director_widget(director_node, 'duration_seconds')", consumer: "render_notes_md" }

# ----------------------------------------------------------------------------
# Card sections — which state-dict field feeds each pixel.
# ----------------------------------------------------------------------------

card_sections:
  - name: HEADER
    accent: ink
    rows:
      - { display: "Run NNN — {name}",                       field: "name + run_number" }
      - { display: "{date} / audio-lipsync", field: "date + module_name" }

  - name: BASE / RUN
    accent: sky
    rule: copied setup and output target
    rows:
      - { label: "Copied from",    field: "source_workflow_name without .json, wrapped; archive name stays in metadata" }
      - { label: "Output name",    field: "output_name (trimmed visually, full value in metadata)" }
      - { label: "Working folder", field: "wrap_path(work_folder, max_chars=40)" }
      - { label: "Output folder",  field: "wrap_path(output_folder, max_chars=40)" }

  - name: DIRECTOR READINGS
    accent: sky
    rule: active Director structure
    layout: flat-left labels; only the segment list is indented
    rows:
      - { label: "Director", field: "director_flavor" }
      - { label: "Pin tag", field: "director_pin_tag" }
      - { label: "epsilon", field: "epsilon" }
      - { label: "Audio", field: "audio_src" }
      - { label: "Frame rate", field: "frame_rate" }
      - { label: "Image segments", field: "(len(segments))" }
      - { label: "Audio segments", field: "(len(audio_segments))" }
      - { label: "Prompt mode", field: "segment_prompt_mode" }
      - {
          repeating: true,
          template: "{i+1}) {start_s:.0f} to {end_s:.0f} seconds",
          per_segment_fields: "segments[i].start, segments[i].length, frame_rate",
          indent: 18,
        }
      - { label: "Prompt",   field: "all(segments[i].prompt for i in visible)" }
      - { label: "Audio",    field: "all(video_segment_has_audio(segments[i], audio_segments) for i in visible)" }
      - { label: "Keyframe", field: "all(segments[i].imageFile for i in visible)" }

  - name: KNOB STATE
    accent: amber
    rule: per-render knob
    rows:
      - { label: "relay_overrides", field: "relay_overrides_raw (verbatim, fallback '(empty → defaults)'; marked inert when upstream Director is active)" }

  - name: BASE NOTES
    accent: amber
    rule: per-render note
    rendering: left-accented italic block, blank lines preserved
    field: "info_body"

  - name: POST-RENDER
    accent: green
    rows:
      - { label: "FEEDBACK",                  field: "feedback_lines (wrapped, up to 6 lines)" }
      - { label: "OUTCOME (motion/sync/sharp)", field: "scores parsed from overlay - feedback" }

# ----------------------------------------------------------------------------
# Per-segment coverage — how each [x] / [ ] mark is derived.
# ----------------------------------------------------------------------------

segment_coverage:
  Prompt:
    check: "bool(segment.prompt)"
    note: "Empty prompt → [ ]. Substring content (e.g. '[Audio]:') is NOT examined."
  Prompt mode:
    check: "Normalize whitespace in every timeline_data.segments[].prompt, then classify as none / single / same / per-segment / missing."
    function: "segment_prompt_mode()"
    note: "Small image-sequence prompt check for whether every segment uses the same prompt or each segment differs."
  Audio:
    check: "any audioSegments[].overlap(segment.start, segment.length)"
    function: "video_segment_has_audio()"
    note: "Reads timeline_data.audioSegments — the structural source the director consumes. Does NOT scan the prompt text."
  Keyframe:
    check: "bool(segment.imageFile)"
    note: "Just checks that an image file was assigned in the timeline editor."

aggregate_rule:
  description: >
    The Prompt/Audio/Keyframe coverage rows under BASE · SCENE are
    section-level. Each row is "[x]" only when every visible segment
    has that field set (logical AND). Mixed coverage degrades to "[ ]"
    with the muted accent so the maintainer can see at a glance which
    field is missing somewhere.

# ----------------------------------------------------------------------------
# Outputs — what the loop writes per render.
# ----------------------------------------------------------------------------

outputs:
  per_run_folder:
    path: runs/run-NNN_<label>/
    files:
      runNNN_workflow.json: Redacted copy of the saved workflow at submission.
      card.png:            Rendered card matching this graph plus embedded koolook_audio_loop JSON metadata.
      metadata.json:        Structured run/setup/director/repo metadata, same technical payload embedded in the PNG.
      notes.md:            OVERLAY-FEEDBACK + OVERLAY-INFO verbatim + captured SETUP variables + director's structural state.
      relay_overrides.txt: RELAY_OVERRIDES body in plain text (diff-friendly copy of the multiline).
      patch_state.txt:     MAIN sha + last dev-sync-audio sha + fork-dir clean/dirty. Also represented in metadata.
  delivery_copy:
    path: "<Output folder>/cards/<Output name>_runNNN_card.png"
    purpose: Stable external card path for manual QuickTime/NLE compositing beside the rendered video. Re-render script replaces this copy.
  rolling_log:
    path: runs/log.md
    schema:
      columns: [Run, Date, Director, relay_overrides, Audio src, Segments, Scores, Notes]
      segments_cell: "Nv/Na (video segments / audio segments)"
      rule: Same source families as the card. No scheduler/sampler columns.

# ----------------------------------------------------------------------------
# Triggers — user-initiated only. Never automatic.
# ----------------------------------------------------------------------------

triggers:
  loop-audio:
    script: scripts/loop_audio.py
    config: scripts/loop_audio.config.json
    invokes: this reading graph
    discovery_chain:
      - KOLOOK_COMFYUI_DEV_PATH (.env, repo root or main repo when running from a worktree)
      - walk up two levels to <ComfyUI>/
      - + comfyui_workflows_subpath from config → <ComfyUI>/user/default/workflows
      - glob workflow_pattern, exclude skip_filename_substring
      - newest mtime wins
    override_env: KOLOOK_COMFYUI_WORKFLOWS_DIR
    override_arg: --workflow <explicit-path>
  dev-sync-audio:
    script: scripts/sync_to_dev_audio.py
    purpose: >
      Required after editing forks/whatdreamscost_koolook/ source. Copies
      the fork, web/whatdreamscost_koolook/, and the root __init__.py into
      $KOLOOK_COMFYUI_DEV_PATH; removes stale pre-v1.3.9 web extension paths;
      restart ComfyUI manually after Python changes so modules re-import.
    not_required_for: widget-only changes on the canvas (no Python edit)

# ----------------------------------------------------------------------------
# Invariants — properties the design must preserve.
# ----------------------------------------------------------------------------

invariants:
  - Every value displayed on the card traces to one of the two source families.
  - Audio src is derived structurally from director wiring; never from prompt text.
  - "(no director)" is its own audio_src state — a missing Koolook Director node never silently collapses into "off (no VAE)".
  - notes.md mirrors only the configured multilines, configured SETUP variables, and director's structural state.
  - SETUP variables from the canvas setup note are captured to notes.md as audit context; they do not expand the card surface by default.
  - The per-render folder is identified by (NNN, label) and is independently re-renderable from runNNN_workflow.json alone.
  - The log.md schema mirrors the card's source rule — no scheduler/sampler columns.
  - Widget indices in DIRECTOR_WIDX match the saved workflow JSON order, NOT the schema order in ltx_director.py.
  - parse_timeline coerces per-segment numeric fields (start/length/trimStart) to int so downstream arithmetic stays type-safe regardless of what shape the Comfy frontend saved into the JSON.
  - extract_multilines accepts either the legacy flat list or the semantic alias map; alias-map order decides preferred matches, with longest aliases checked first inside the same priority.
  - 0 is a legitimate score value, never coerced to '?' on either the card or the log row.
  - find_dotenv walks up to the main repo when run from a worktree — same as scripts/make_card.py.

# ----------------------------------------------------------------------------
# Related files — for a reader rebuilding this from cold.
# ----------------------------------------------------------------------------

related_files:
  scripts:
    - scripts/loop_audio.py
    - scripts/loop_audio.config.json
    - scripts/make_card_audio.py
    - scripts/make_card.py            # sibling renderer for base-1step
    - scripts/sync_to_dev_audio.py    # dev-sync-audio chat phrase
  fork:
    - forks/whatdreamscost_koolook/versions/v1_3_9/ltx_director.py
    - forks/whatdreamscost_koolook/versions/v1_3_9/prompt_relay.py
  module_docs:
    - docs/automations/LTX-2.3/audio-lipsync/README.md
    - docs/automations/LTX-2.3/audio-lipsync/CHEATSHEET.md
    - docs/automations/LTX-2.3/audio-lipsync/runs/LOOP.md
    - docs/automations/LTX-2.3/audio-lipsync/backstory/audio-lipsync-rationale.md

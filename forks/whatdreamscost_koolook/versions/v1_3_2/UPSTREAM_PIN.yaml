notes: |
  This version folder ships:
    - ltx_director.py  (MODIFIED — adds `relay_overrides` multiline input)
    - prompt_relay.py  (MODIFIED — per-segment sigma per Prompt-Relay paper)
    - patches.py       (UNMODIFIED — vendored verbatim; ltx_director.py
                        imports detect_model_type / apply_patches from it)

  Only one node is registered: `LTXDirector` (suffixed `__koolook_v1_3_2`
  to avoid colliding with installed upstream WhatDreamsCost-ComfyUI). The
  companion `LTXDirectorGuide` is unmodified and consumed from the user's
  upstream install — graphs wire
  `LTXDirector__koolook_v1_3_2.guide_data -> LTXDirectorGuide.latent`.

  See forks/THIRD_PARTY.md for the full attribution + diff against upstream.

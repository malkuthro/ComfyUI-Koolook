notes: |
  A faithful replica of upstream 2.0.2 `LTXDirector` with exactly ONE additive
  change. None of the older Koolook customizations (relay_overrides,
  audio_transcript_json, per-segment sigma) are carried into this version — it
  is a clean 2.0.2 base so all latest upstream features (Prompt Relay, audio,
  motion) behave exactly as upstream.

  This version folder ships:
    - ltx_director.py  (upstream 2.0.2 VERBATIM + two additive changes only:
      the namespaced node ID `LTXDirector__koolook`, and the
      `snap_keyframes_to_grid` latent-bucket keyframe snap from issue #258).
    - prompt_relay.py  (VERBATIM upstream 2.0.2; imported by ltx_director.py).
    - patches.py       (VERBATIM upstream 2.0.2; imported by ltx_director.py).
    - keyframe_grid.py (NEW, Koolook-original) pure latent-grid snapper used by
      ltx_director.py; unit-tested in tests/forks/.

  Node IDs: the canonical `LTXDirector__koolook` rolls to this clean 2.0.2
  implementation (package entrypoint loads v2_0_2 last). The legacy
  `LTXDirector__koolook_v1_3_2` ID is NOT registered here; it stays backed by
  the v1_3_9 package for workflows saved against it. The companion
  `LTXDirectorGuide` is upstream-unmodified and consumed from the user's
  install; the grid-snap operates on the pixel `insert_frames` this node emits,
  so the guide node needs no change. v1.3.9 (with the older customizations)
  remains on disk for rollback.

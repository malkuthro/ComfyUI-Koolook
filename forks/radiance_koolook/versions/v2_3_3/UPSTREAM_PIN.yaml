notes: |
  This version folder mirrors only the RadianceVAE4KEncode / RadianceVAE4KDecode
  *interface surface* from upstream v2.3.3's hdr/vae.py. The Koolook
  reimplementation skips the 4K cosine-blend tile engine, which conflicts with
  video VAEs (Wan 2.2, Hunyuan, CogVideoX, LTX) that handle their own
  temporal/spatial stitching internally. See forks/THIRD_PARTY.md for the
  full attribution + change log.

    sync_state: "interface-mirror-only"
    license: "GPL-3.0"
    license_verified_at: "2026-05-03"
    notes: "Mirrors only the RadianceVAE4KEncode/Decode interface surface — Koolook ships a slimmer rank-agnostic reimplementation that handles image sequences (video frames) without the upstream's 4K cosine-blend tile engine, which conflicts with video VAEs (Wan 2.2 etc.) that already do their own temporal stitching."

  - id: "whatdreamscost_koolook_v1_3_2_ltx_director"
    name: "WhatDreamsCost Koolook v1.3.2 LTX Director subset"
    source_repo: "https://github.com/WhatDreamsCost/WhatDreamsCost-ComfyUI.git"
    source_ref: "v1.3.2 (pinned to post-tag README-only commit on main)"
    pinned_commit: "e81223a2add687555a6371e311b325880bf7c3c9"
    external_checkout:
      relative_path_from_forks_root: "whatdreamscost-v1.3.2-koolook"
      upstream_tracking_path_from_forks_root: "whatdreamscost-main-upstream"
      default_branch: "main"
    local_paths:
      - "forks/whatdreamscost_koolook/__init__.py"
      - "forks/whatdreamscost_koolook/versions/v1_3_2/__init__.py"
      - "forks/whatdreamscost_koolook/versions/v1_3_2/UPSTREAM_PIN.yaml"
      - "forks/whatdreamscost_koolook/versions/v1_3_2/ltx_director.py"
      - "forks/whatdreamscost_koolook/versions/v1_3_2/prompt_relay.py"
      - "forks/whatdreamscost_koolook/versions/v1_3_2/patches.py"
    status: "modified"
    sync_state: "ltx-director-modified-plus-deps"
    license: "GPL-3.0"
    license_verified_at: "2026-05-28"
    exposed_node_ids:
      - "LTXDirector__koolook"
      - "LTXDirector__koolook_v1_3_2"
    notes: |
      Ships a Koolook variant of upstream's `LTXDirector` only — the companion
      `LTXDirectorGuide` is consumed from the user's upstream install via the
      `guide_data -> latent` wiring. The Koolook variant adds:
        1) a `relay_overrides` multiline JSON input on the LTX Director canvas
           widget so per-render Prompt-Relay knob overrides live inside the
           workflow JSON (no disk file / no env var);
        2) per-segment sigma in `build_segments` matching the Prompt-Relay paper
           formula σ = (L − w_eff) / (2 · sqrt(ln(1/ε))) instead of upstream's
           length-independent constant (≈ 0.1448 at ε=0.001).
      `patches.py` is vendored verbatim from upstream e81223a — `ltx_director.py`
      imports `detect_model_type` and `apply_patches` from it. The maintainer-
      facing iteration loop driving changes here lives at
      `docs/automations/LTX-2.3/audio-lipsync/`.

  - id: "whatdreamscost_koolook_v1_3_9_ltx_director"
    name: "WhatDreamsCost Koolook v1.3.9 LTX Director subset"
    source_repo: "https://github.com/WhatDreamsCost/WhatDreamsCost-ComfyUI.git"
    source_ref: "v1.3.9 (pyproject/README version on main; no v1.3.9 git tag at fork time)"
    pinned_commit: "3b65410c1ce684663a3dfa6fb073588c35275d83"
    external_checkout:
      relative_path_from_forks_root: "whatdreamscost-v1.3.9-koolook"
      upstream_tracking_path_from_forks_root: "whatdreamscost-main-upstream"
      default_branch: "main"
    local_paths:
      - "forks/whatdreamscost_koolook/__init__.py"
      - "forks/whatdreamscost_koolook/versions/v1_3_9/__init__.py"
      - "forks/whatdreamscost_koolook/versions/v1_3_9/UPSTREAM_PIN.yaml"
      - "forks/whatdreamscost_koolook/versions/v1_3_9/ltx_director.py"
      - "forks/whatdreamscost_koolook/versions/v1_3_9/prompt_relay.py"
      - "forks/whatdreamscost_koolook/versions/v1_3_9/patches.py"
      - "web/whatdreamscost_koolook/ltx_director.js"
    status: "modified"
    sync_state: "ltx-director-modified-plus-deps"
    license: "GPL-3.0"
    license_verified_at: "2026-05-29"
    exposed_node_ids:
      - "LTXDirector__koolook_v1_3_2"
    notes: |
      Side-by-side successor to the v1.3.2 Koolook fork. Carries forward the
      `relay_overrides` multiline JSON input and Prompt-Relay per-segment sigma
      patch, while keeping upstream v1.3.9's audio latent compatibility fixes.
      Adds Koolook's optional `audio_transcript_json` execution input, which
      turns timed speech phrases into Prompt Relay `local_prompts` and
      `segment_lengths` without replacing existing timeline image segments.
      `patches.py` is vendored verbatim from upstream 3b65410. New workflows
      use stable node ID `LTXDirector__koolook`; saved workflows using
      `LTXDirector__koolook_v1_3_2` still load through a legacy alias backed
      by this v1.3.9 implementation. The original v1.3.2 source remains on
      disk for attribution, review, and rollback.

  - id: "whatdreamscost_koolook_v2_0_2_ltx_director"
    name: "WhatDreamsCost Koolook v2.0.2 LTX Director subset"
    source_repo: "https://github.com/WhatDreamsCost/WhatDreamsCost-ComfyUI.git"
    source_ref: "2.0.2 (pyproject/README version on main; upstream does not tag releases)"
    pinned_commit: "fe09f73756df202d08341c66b4dc5fc8d2acca22"
    external_checkout:
      relative_path_from_forks_root: "whatdreamscost-v2.0.2-koolook"
      upstream_tracking_path_from_forks_root: "whatdreamscost-main-upstream"
      default_branch: "main"
    local_paths:
      - "forks/whatdreamscost_koolook/__init__.py"
      - "forks/whatdreamscost_koolook/versions/v2_0_2/__init__.py"
      - "forks/whatdreamscost_koolook/versions/v2_0_2/UPSTREAM_PIN.yaml"
      - "forks/whatdreamscost_koolook/versions/v2_0_2/ltx_director.py"
      - "forks/whatdreamscost_koolook/versions/v2_0_2/prompt_relay.py"
      - "forks/whatdreamscost_koolook/versions/v2_0_2/patches.py"
      - "forks/whatdreamscost_koolook/versions/v2_0_2/keyframe_grid.py"
    status: "modified"
    sync_state: "upstream-verbatim-plus-keyframe-snap"
    license: "GPL-3.0"
    license_verified_at: "2026-06-22"
    exposed_node_ids:
      - "LTXDirector__koolook"
    notes: |
      A faithful replica of upstream 2.0.2 `LTXDirector` — NOT a carry-forward
      of the older Koolook customizations. relay_overrides, audio_transcript_json,
      and the per-segment sigma patch are intentionally dropped (unused), so all
      latest 2.0.2 features (Prompt Relay, audio, motion) behave exactly as
      upstream. `ltx_director.py` is upstream 2.0.2 verbatim except for two
      additive changes: the namespaced node ID `LTXDirector__koolook`, and the
      `snap_keyframes_to_grid` latent-bucket keyframe snap (default on, issue
      #258) — image keyframes snap to the center of their LTX latent-time bucket
      so hard pins land cleanly on one latent frame, with collision bumping +
      warnings. `prompt_relay.py` and `patches.py` are vendored verbatim from
      upstream fe09f73. The canonical `LTXDirector__koolook` rolls to this clean
      2.0.2 implementation (package entrypoint loads v2_0_2 last); the legacy
      `LTXDirector__koolook_v1_3_2` ID stays backed by the v1_3_9 package. The
      companion `LTXDirectorGuide` is upstream-unmodified and consumed from the
      user's install. v1.3.9 (with the older customizations) remains on disk.


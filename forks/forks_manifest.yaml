version: 1
updated_at: "2026-05-03"
external_forks:
  root_relative_to_main: "../ComfyUI-Forks"
  root_env_var: "KOLOOK_FORKS_DIR"
  notes: "Keep raw upstream/fork clones here. Modified working nodes live in MAIN and are tracked by this repository."
  naming_convention:
    pinned_baseline: "<repo>-v<version>-koolook"
    rolling_upstream: "<repo>-main-upstream"
entries:
  - id: "radiance_koolook_v1_0_1_baseline"
    name: "Radiance Koolook v1.0.1 baseline (REMOVED in v0.1.5)"
    source_repo: "https://github.com/fxtdstudios/radiance.git"
    source_ref: "comfyui (closest public baseline; v1.0.1 tag not found upstream)"
    pinned_commit: "f1b8ae330848fa08aba24c9d3e355cb432d3515b"
    status: "removed"
    removed_at: "2026-05-03"
    removed_in_release: "0.1.5"
    license: "GPL-3.0"
    license_verified_at: "2026-05-03"
    notes: "Dropped in v0.1.5. The v1_0_1 fork wrapped 24 verbatim Radiance v1.0 classes plus 2 modified ones (RadianceOCIOColorTransformV2 with a multiframe variant, and a Koolook-original RadianceVAEEncode/Decode pair). None of the wrappers were used by Koolook authors and the VAE pair was superseded by Easy_hdr_VAE_encode/decode in v2_3_3. Code recoverable via git history (last commit before removal: see CHANGELOG [0.1.5]). Users wanting Radiance functionality should install upstream Radiance directly."

  - id: "radiance_koolook_v2_3_3_vae_subset"
    name: "Radiance Koolook v2.3.3 VAE Encode/Decode subset"
    source_repo: "https://github.com/fxtdstudios/radiance.git"
    source_ref: "v2.3.3 release commit (no clean tag — upstream uses misspelled 'radinace2.3.3')"
    pinned_commit: "f262f47ddfda01ece154bf80c22769b1e4cef795"
    external_checkout:
      relative_path_from_forks_root: "radiance-v2.3.3-koolook"
      upstream_tracking_path_from_forks_root: "radiance-main-upstream"
      default_branch: "main"
    local_paths:
      - "forks/radiance_koolook/versions/v2_3_3/__init__.py"
      - "forks/radiance_koolook/versions/v2_3_3/UPSTREAM_PIN.yaml"
      - "forks/radiance_koolook/versions/v2_3_3/nodes_vae.py"
    status: "modified"
    sync_state: "interface-mirror-only"
    license: "GPL-3.0"
    license_verified_at: "2026-05-03"
    notes: "Mirrors only the RadianceVAE4KEncode/Decode interface surface — Koolook ships a slimmer rank-agnostic reimplementation that handles image sequences (video frames) without the upstream's 4K cosine-blend tile engine, which conflicts with video VAEs (Wan 2.2 etc.) that already do their own temporal stitching."

  - id: "easy_resize_inspiration"
    name: "Easy Resize (Koolook reimplementation, inspired by KJ Nodes)"
    source_repo: "https://github.com/kijai/ComfyUI-KJNodes"
    source_ref: "main (interface inspiration only — not a vendored copy)"
    local_paths:
      - "k_easy_resize.py"
    status: "inspired_reimplementation"
    sync_state: "no-upstream-tracking-needed"
    license: "GPL-3.0"
    license_verified_at: "2026-05-03"
    exposed_node_ids:
      - "EasyResize_Koolook"          # canonical (v0.1.6+)
      - "EasyResize"                   # deprecated alias for workflow back-compat
    notes: "Idea-level inspiration from KJ Nodes' Resize Image V2 (GPL-3.0 — same as our pack, so no relicense pressure). Implementation is a fresh write that substantially extends the surface (aspect-ratio parser, keep_proportion modes, mask + composed outputs, device selection, etc). Renamed in v0.1.6 from bare 'EasyResize' to 'EasyResize_Koolook' to resolve a node-ID collision with ComfyUI-EasyFilePaths."

  - id: "promptjson_integration_reference"
    name: "PromptJSON interoperability reference"
    source_repo: "https://github.com/NeuralSamurAI/ComfyUI-PromptJSON"
    source_ref: "n/a"
    local_paths: []
    status: "reference_only"
    sync_state: "n/a"
    license: "unknown"
    notes: "No vendored code; integration reference in docs/workflows."

  - id: "wan22_parameter_reference"
    name: "Wan 2.2 parameter docs reference"
    source_repo: "https://alidocs.dingtalk.com/i/nodes/EpGBa2Lm8aZxe5myC99MelA2WgN7R35y"
    source_ref: "n/a"
    local_paths:
      - "config.json"
      - "k_easy_wan22_prompt.py"
    status: "reference_only"
    sync_state: "manual"
    license: "unknown"
    notes: "Prompt parameter taxonomy inspired by external docs; no direct vendored code tracked yet."

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Save snapshot recipe</title>
  <desc id="desc">Annotated mock screenshot for saving the current Kforge Labs snapshot.</desc>
  <rect width="900" height="600" fill="#131315"/>
  <g font-family="Arial, sans-serif">
    <rect x="48" y="48" width="370" height="506" rx="4" fill="#151515" stroke="#302f2f"/>

    <circle cx="72" cy="82" r="7" fill="#6fc56f"/>
    <text x="96" y="90" fill="#f9fafb" font-size="22">Koolook_v03</text>
    <text x="236" y="90" fill="#707982" font-size="15">· saved</text>
    <rect x="272" y="60" width="42" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="284" y="84" fill="#f9fafb" font-size="23">↧</text>
    <rect x="322" y="60" width="42" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="335" y="84" fill="#f9fafb" font-size="23">▣</text>
    <rect x="372" y="60" width="34" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="380" y="84" fill="#f9fafb" font-size="23">⚙</text>
    <path d="M64 118 H402" stroke="#302f2f" stroke-width="2"/>

    <text x="64" y="156" fill="#9ca3af" font-size="15" font-weight="700" letter-spacing="3">TOOLS</text>
    <rect x="272" y="132" width="42" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="284" y="157" fill="#f9fafb" font-size="23">↓</text>
    <rect x="322" y="132" width="42" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="334" y="157" fill="#f9fafb" font-size="23">↧</text>
    <rect x="372" y="132" width="34" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="379" y="157" fill="#f9fafb" font-size="22">▦</text>
    <path d="M64 190 H402" stroke="#302f2f" stroke-width="2"/>

    <rect x="64" y="216" width="338" height="48" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="88" y="247" fill="#707982" font-size="23">⌕</text>
    <text x="122" y="247" fill="#707982" font-size="21">Search nodes &amp; workflows...</text>
    <path d="M64 292 H402" stroke="#302f2f" stroke-width="2"/>

    <text x="64" y="340" fill="#9ca3af" font-size="17" font-weight="700" letter-spacing="2">NODES</text>
    <rect x="278" y="316" width="60" height="42" rx="6" fill="#162556" stroke="#4268ba"/>
    <text x="298" y="344" fill="#f9fafb" font-size="24">⌘</text>
    <rect x="338" y="316" width="50" height="42" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="356" y="344" fill="#f9fafb" font-size="24">≡</text>
    <rect x="64" y="394" width="338" height="58" rx="8" fill="#1a1a1f"/>
    <text x="88" y="430" fill="#f9fafb" font-size="18" font-weight="700">Nodes (favorites)</text>
    <circle cx="378" cy="423" r="17" fill="#24242c"/>
    <text x="372" y="430" fill="#d8d8d8" font-size="16">11</text>

    <g transform="translate(456 74)">
      <rect width="392" height="230" rx="14" fill="#151515" stroke="#707982" stroke-width="2"/>
      <text x="34" y="54" fill="#f9fafb" font-size="29" font-weight="700">Save snapshot</text>
      <text x="34" y="108" fill="#d8d8d8" font-size="22" font-weight="700">Library folder: Test_PRESETS</text>
      <text x="34" y="138" fill="#9ca3af" font-size="20">/Volumes/Data/ComfyUI_presets/Test_PRESETS</text>
      <text x="34" y="186" fill="#d8d8d8" font-size="22">Save current state over "Koolook_v03"?</text>
      <rect x="64" y="208" width="96" height="42" rx="6" fill="#1a1a1f" stroke="#707982"/>
      <text x="91" y="236" fill="#f9fafb" font-size="20" font-weight="700">Cancel</text>
      <rect x="176" y="208" width="148" height="42" rx="6" fill="#1a1a1f" stroke="#707982"/>
      <text x="206" y="236" fill="#f9fafb" font-size="20" font-weight="700">Save as new...</text>
      <rect x="338" y="208" width="86" height="42" rx="6" fill="#162556" stroke="#68aaff"/>
      <text x="364" y="236" fill="#f9fafb" font-size="20" font-weight="700">Save</text>
    </g>

    <path d="M342 78 H438" stroke="#68aaff" stroke-width="4"/>
    <path d="M438 78 l-16 -11 v22 z" fill="#68aaff"/>
    <circle cx="340" cy="78" r="15" fill="#162556" stroke="#68aaff" stroke-width="3"/>
    <text x="335" y="84" fill="#f9fafb" font-size="16" font-weight="700">S</text>

    <text x="456" y="372" fill="#c9944b" font-size="19" font-weight="700">Tip</text>
    <text x="456" y="406" fill="#707982" font-size="18">Save updates the current project kit.</text>
    <text x="456" y="434" fill="#707982" font-size="18">Save as new creates another named snapshot.</text>
    <text x="456" y="462" fill="#707982" font-size="18">Quick Save uses the same current name without the dialog.</text>
  </g>
</svg>

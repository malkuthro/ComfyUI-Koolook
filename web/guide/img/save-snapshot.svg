<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Save snapshot recipe</title>
  <desc id="desc">Annotated mock screenshot for saving a snapshot.</desc>
  <rect width="900" height="600" fill="#131315"/>
  <g font-family="Arial, sans-serif">
    <rect x="66" y="70" width="280" height="460" rx="18" fill="#151515" stroke="#302f2f"/>
    <text x="92" y="112" fill="#f9fafb" font-size="22" font-weight="700">Kforge Labs</text>
    <rect x="92" y="140" width="228" height="42" rx="8" fill="#0e0e0e" stroke="#302f2f"/>
    <circle cx="112" cy="161" r="7" fill="#e0a64a"/>
    <text x="132" y="167" fill="#f9fafb" font-size="14">Client_Shot010</text>
    <text x="242" y="167" fill="#707982" font-size="12">unsaved</text>
    <circle cx="286" cy="210" r="18" fill="#162556" stroke="#4268ba" stroke-width="3"/>
    <text x="279" y="217" fill="#f9fafb" font-size="18" font-weight="700">S</text>
    <rect x="92" y="252" width="228" height="42" rx="8" fill="#0e0e0e" stroke="#302f2f"/>
    <text x="118" y="278" fill="#707982" font-size="14">Search...</text>
    <rect x="92" y="318" width="228" height="54" rx="8" fill="#1a1a1f"/>
    <text x="114" y="352" fill="#f9fafb" font-size="16" font-weight="700">Nodes</text>
    <rect x="92" y="396" width="228" height="54" rx="8" fill="#1a1a1f"/>
    <text x="114" y="430" fill="#f9fafb" font-size="16" font-weight="700">Workflows</text>
    <path d="M310 210 H500" stroke="#4268ba" stroke-width="4"/>
    <path d="M500 210 l-18 -12 v24 z" fill="#4268ba"/>
    <rect x="526" y="138" width="292" height="170" rx="16" fill="#1a1a1f" stroke="#4268ba"/>
    <text x="554" y="182" fill="#f9fafb" font-size="26" font-weight="700">Save Snapshot</text>
    <text x="554" y="224" fill="#707982" font-size="18">Name it for the project, shot,</text>
    <text x="554" y="252" fill="#707982" font-size="18">or task you want to return to.</text>
    <rect x="554" y="272" width="190" height="36" rx="7" fill="#0e0e0e" stroke="#302f2f"/>
    <text x="574" y="296" fill="#f9fafb" font-size="16">Client_Shot010</text>

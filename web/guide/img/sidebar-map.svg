  <g font-family="Arial, sans-serif" font-size="18" fill="#f9fafb">
    <path d="M454 142 H645" stroke="#4a8058" stroke-width="3"/>
    <circle cx="454" cy="142" r="7" fill="#4a8058"/>
    <text x="666" y="136" font-weight="700">Snapshot row</text>
    <text x="666" y="164" fill="#707982" font-size="15">Load, Quick Save, Save, Settings.</text>
    <path d="M454 197 H645" stroke="#4268ba" stroke-width="3"/>

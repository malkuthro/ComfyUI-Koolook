<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Sidebar map</title>
  <desc id="desc">Annotated mock screenshot of the Kforge Labs sidebar.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#0e0e0e"/>
  <rect x="68" y="52" width="376" height="656" rx="18" fill="#151515" stroke="#302f2f" filter="url(#shadow)"/>
  <text x="96" y="94" fill="#f9fafb" font-family="Arial, sans-serif" font-size="24" font-weight="700">Kforge Labs</text>
  <rect x="96" y="120" width="320" height="42" rx="8" fill="#0e0e0e" stroke="#302f2f"/>

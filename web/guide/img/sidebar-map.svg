    <text x="118" y="326" fill="#f9fafb" font-weight="700">Nodes</text>
    <text x="330" y="326" fill="#707982">Theme</text>
    <rect x="116" y="364" width="280" height="42" rx="7" fill="#151515"/>
    <text x="138" y="391" fill="#f9fafb">Image</text>
    <rect x="116" y="414" width="280" height="42" rx="7" fill="#151515"/>
    <text x="138" y="441" fill="#f9fafb">VAE</text>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Sidebar map</title>
  <desc id="desc">Annotated screenshot of the Kforge Labs sidebar.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { fill: #f9fafb; font: 700 20px Arial, sans-serif; }
      .note { fill: #707982; font: 16px Arial, sans-serif; }
      .call { fill: none; stroke-width: 3; }
      .box { fill: rgba(66,104,186,0.10); stroke-width: 3; rx: 8; }
    </style>
  </defs>
  <rect width="1200" height="820" fill="#0e0e0e"/>

  <image href="screenshots/sidebar-overview.png" x="44" y="30" width="594" height="720" preserveAspectRatio="xMidYMid meet" filter="url(#shadow)"/>

  <rect class="box" x="52" y="38" width="574" height="56" stroke="#4a8058"/>
  <path class="call" d="M638 66 H735" stroke="#4a8058"/>
  <circle cx="638" cy="66" r="7" fill="#4a8058"/>
  <text class="label" x="760" y="62">Snapshot row</text>
  <text class="note" x="760" y="88">Load, Quick Save, Save, Settings.</text>

  <rect class="box" x="52" y="104" width="574" height="58" stroke="#4268ba"/>
  <path class="call" d="M638 132 H735" stroke="#4268ba"/>
  <circle cx="638" cy="132" r="7" fill="#4268ba"/>
  <text class="label" x="760" y="128">Tools row</text>
  <text class="note" x="760" y="154">Maintenance plus the Help guide.</text>

  <rect class="box" x="52" y="178" width="574" height="54" stroke="#c9944b"/>
  <path class="call" d="M638 205 H735" stroke="#c9944b"/>
  <circle cx="638" cy="205" r="7" fill="#c9944b"/>
  <text class="label" x="760" y="201">Search</text>
  <text class="note" x="760" y="227">Find nodes, workflows, folders, and tags.</text>

  <rect class="box" x="52" y="278" width="574" height="80" stroke="#a04040"/>
  <path class="call" d="M638 318 H735" stroke="#a04040"/>
  <circle cx="638" cy="318" r="7" fill="#a04040"/>
  <text class="label" x="760" y="314">Nodes</text>
  <text class="note" x="760" y="340">Favorites grouped by theme or repository name.</text>

  <rect class="box" x="52" y="374" width="574" height="74" stroke="#452e83"/>
  <path class="call" d="M638 411 H735" stroke="#452e83"/>
  <circle cx="638" cy="411" r="7" fill="#452e83"/>
  <text class="label" x="760" y="407">Workflows / modules</text>
  <text class="note" x="760" y="433">Save scripts, save selections, or insert modules.</text>

  <rect class="box" x="52" y="458" width="574" height="214" stroke="#4a8058"/>
  <path class="call" d="M638 565 H735" stroke="#4a8058"/>
  <circle cx="638" cy="565" r="7" fill="#4a8058"/>
  <text class="label" x="760" y="561">Saved lists</text>
  <text class="note" x="760" y="587">Nodes, Workflows, and Tags stay visible below.</text>

  <text x="760" y="672" fill="#c9944b" font-family="Arial, sans-serif" font-size="18" font-weight="700">Real screenshot base</text>
  <text x="760" y="700" fill="#707982" font-family="Arial, sans-serif" font-size="16">Only the colored boxes and callout lines are overlays.</text>
</svg>

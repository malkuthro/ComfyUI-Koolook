    <rect x="330" y="126" width="34" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="337" y="151" fill="#f9fafb" font-size="22">▦</text>
    <path d="M64 184 H362" stroke="#302f2f" stroke-width="2"/>

    <rect x="64" y="212" width="298" height="48" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="88" y="243" fill="#707982" font-size="23">⌕</text>
    <text x="122" y="243" fill="#707982" font-size="20">Search nodes &amp; workflows...</text>
    <path d="M64 288 H362" stroke="#302f2f" stroke-width="2"/>

    <text x="64" y="336" fill="#9ca3af" font-size="17" font-weight="700" letter-spacing="2">NODES</text>
    <rect x="214" y="312" width="58" height="42" rx="6" fill="#162556" stroke="#4268ba"/>
    <text x="233" y="340" fill="#f9fafb" font-size="24">⌘</text>

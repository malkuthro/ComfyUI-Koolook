      <text x="34" y="112" fill="#d8d8d8" font-size="22" font-weight="700">Library folder: Test_PRESETS</text>
      <text x="34" y="142" fill="#9ca3af" font-size="20">/Volumes/Data/ComfyUI_presets/Test_PRESETS</text>
      <rect x="318" y="84" width="58" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
      <text x="330" y="108" fill="#f9fafb" font-size="19">📂 Open</text>

      <rect x="34" y="172" width="340" height="82" rx="6" fill="#151515" stroke="#302f2f"/>
      <text x="54" y="207" fill="#f9fafb" font-size="26">Koolook_v03</text>
      <text x="54" y="238" fill="#9ca3af" font-size="21">6 workflows · 9 picks · saved May 8, 12:56 AM</text>
      <rect x="330" y="200" width="34" height="34" rx="5" fill="#1a1a1f" stroke="#707982"/>
      <text x="342" y="224" fill="#f9fafb" font-size="20">×</text>

      <path d="M34 286 H374" stroke="#302f2f" stroke-width="2"/>

    <path d="M292 72 H410" stroke="#68aaff" stroke-width="4"/>
    <path d="M410 72 l-16 -11 v22 z" fill="#68aaff"/>
    <circle cx="292" cy="72" r="15" fill="#162556" stroke="#68aaff" stroke-width="3"/>
    <text x="287" y="78" fill="#f9fafb" font-size="16" font-weight="700">L</text>

    <text x="430" y="514" fill="#c9944b" font-size="19" font-weight="700">Tip</text>
    <text x="430" y="544" fill="#707982" font-size="18">Click a snapshot row to replace the current sidebar state with that kit.</text>
    <text x="430" y="572" fill="#707982" font-size="18">Open Recovery auto-saves if you need to roll back.</text>

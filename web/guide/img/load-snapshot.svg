    <text x="290" y="340" fill="#f9fafb" font-size="24">≡</text>
    <path d="M64 380 H362" stroke="#302f2f" stroke-width="2"/>

    <text x="64" y="428" fill="#9ca3af" font-size="17" font-weight="700" letter-spacing="2">WORKFLOWS</text>
    <rect x="244" y="404" width="42" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="256" y="429" fill="#f9fafb" font-size="22">▣</text>
    <rect x="294" y="404" width="42" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="302" y="429" fill="#f9fafb" font-size="22">▦</text>
    <path d="M64 468 H362" stroke="#302f2f" stroke-width="2"/>

    <g transform="translate(430 64)">

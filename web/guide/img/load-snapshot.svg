    <rect x="320" y="54" width="42" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="333" y="79" fill="#f9fafb" font-size="23">▣</text>
    <path d="M64 112 H362" stroke="#302f2f" stroke-width="2"/>

    <text x="64" y="150" fill="#9ca3af" font-size="15" font-weight="700" letter-spacing="3">TOOLS</text>
    <rect x="230" y="126" width="42" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>
    <text x="242" y="151" fill="#f9fafb" font-size="23">↓</text>
    <rect x="280" y="126" width="42" height="34" rx="6" fill="#1a1a1f" stroke="#707982"/>

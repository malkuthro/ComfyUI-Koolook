<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Save module recipe</title>
  <desc id="desc">Annotated mock screenshot for saving a selected cluster as a module.</desc>
  <rect width="900" height="600" fill="#131315"/>
  <g font-family="Arial, sans-serif">
    <rect x="54" y="78" width="440" height="340" rx="18" fill="#0e0e0e" stroke="#302f2f"/>
    <rect x="88" y="130" width="150" height="80" rx="12" fill="#162556" stroke="#4268ba"/>
    <text x="113" y="176" fill="#f9fafb" font-size="17" font-weight="700">Prompt</text>
    <rect x="292" y="130" width="150" height="80" rx="12" fill="#162556" stroke="#4268ba"/>
    <text x="322" y="176" fill="#f9fafb" font-size="17" font-weight="700">Encoder</text>
    <rect x="188" y="270" width="150" height="80" rx="12" fill="#162556" stroke="#4268ba"/>
    <text x="222" y="316" fill="#f9fafb" font-size="17" font-weight="700">Output</text>
    <path d="M238 170 H292 M264 210 L264 270" stroke="#4268ba" stroke-width="4"/>
    <rect x="70" y="108" width="390" height="270" rx="16" fill="none" stroke="#c9944b" stroke-width="4" stroke-dasharray="10 8"/>
    <text x="78" y="456" fill="#c9944b" font-size="18" font-weight="700">1. Select a useful cluster on the canvas.</text>
    <rect x="560" y="86" width="280" height="430" rx="18" fill="#151515" stroke="#302f2f"/>
    <text x="588" y="130" fill="#f9fafb" font-size="22" font-weight="700">Workflows</text>
    <circle cx="606" cy="176" r="18" fill="#162556" stroke="#4a8058" stroke-width="3"/>
    <text x="600" y="183" fill="#f9fafb" font-size="18" font-weight="700">M</text>
    <rect x="588" y="220" width="224" height="140" rx="12" fill="#1a1a1f" stroke="#4a8058"/>
    <text x="612" y="260" fill="#f9fafb" font-size="22" font-weight="700">Save selection</text>
    <rect x="612" y="288" width="20" height="20" rx="4" fill="#4a8058"/>
    <text x="644" y="305" fill="#f9fafb" font-size="16">Save as module</text>
    <text x="588" y="414" fill="#707982" font-size="17">Modules insert into the current</text>
    <text x="588" y="440" fill="#707982" font-size="17">canvas instead of replacing it.</text>
  </g>
</svg>
